  <style>*{box-sizing:border-box;margin:0;padding:0;}body{background:#080808;overflow-x:hidden;}</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">


const GREEN = "#7eb89a";
const GREEN_DIM = "rgba(126,184,154,0.12)";
const GREEN_BORDER = "rgba(126,184,154,0.28)";
const BLACK = "#080808";
const DARK = "#0e0f11";
const CARD = "#131518";
const BORDER = "rgba(255,255,255,0.07)";
const BORDER2 = "rgba(255,255,255,0.12)";
const WHITE = "#ede9e3";
const MUTED = "rgba(237,233,227,0.45)";

const isMobile = () => typeof window !== 'undefined' && window.innerWidth < 768;

// Overhead power lines with electric glow flowing through
const OverheadLinesSVG = () => (
  <svg viewBox="0 0 1400 800" xmlns="http://www.w3.org/2000/svg"
    style={{width:'100%',height:'100%',position:'absolute',inset:0,display:'block'}}>
    <defs>
      <radialGradient id="sky" cx="50%" cy="30%" r="70%">
        <stop offset="0%" stopColor="#0d1a10" stopOpacity="1"/>
        <stop offset="100%" stopColor="#060808" stopOpacity="1"/>
      </radialGradient>
      <radialGradient id="glow_pulse" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stopColor="#7eb89a" stopOpacity="0.9"/>
        <stop offset="100%" stopColor="#7eb89a" stopOpacity="0"/>
      </radialGradient>
      <filter id="wire_glow">
        <feGaussianBlur stdDeviation="2.5" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="strong_glow">
        <feGaussianBlur stdDeviation="5" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    {/* Sky background */}
    <rect width="1400" height="800" fill="url(#sky)"/>

    {/* Ground */}
    <rect x="0" y="680" width="1400" height="120" fill="#050707"/>
    <rect x="0" y="675" width="1400" height="10" fill="#0a0f0a"/>

    {/* Stars */}
    {Array.from({length:60}).map((_,i)=>(
      <circle key={i} cx={(i*137)%1400} cy={(i*73)%300} r="0.7"
        fill="#ffffff" opacity={0.05+((i*17)%30)/100}/>
    ))}

    {/* === PYLONS === */}
    {[0, 280, 560, 840, 1120, 1400].map((bx,pi)=>{
      const scale = 1 - pi*0.06;
      const h = 380*scale;
      const w = 120*scale;
      const by = 680;
      const cx = bx + (pi===5?0:60*scale);
      return (
        <g key={pi} opacity={0.7-pi*0.06}>
          {/* Main mast */}
          <line x1={cx} y1={by} x2={cx} y2={by-h} stroke="#111a12" strokeWidth={6*scale}/>
          {/* Cross arms */}
          <line x1={cx-w*0.55} y1={by-h*0.75} x2={cx+w*0.55} y2={by-h*0.75} stroke="#111a12" strokeWidth={5*scale}/>
          <line x1={cx-w*0.42} y1={by-h*0.86} x2={cx+w*0.42} y2={by-h*0.86} stroke="#111a12" strokeWidth={4*scale}/>
          <line x1={cx-w*0.28} y1={by-h*0.94} x2={cx+w*0.28} y2={by-h*0.94} stroke="#111a12" strokeWidth={3*scale}/>
          {/* Diagonal braces */}
          <line x1={cx} y1={by-h*0.6} x2={cx-w*0.55} y2={by-h*0.75} stroke="#0e160f" strokeWidth={2.5*scale}/>
          <line x1={cx} y1={by-h*0.6} x2={cx+w*0.55} y2={by-h*0.75} stroke="#0e160f" strokeWidth={2.5*scale}/>
          <line x1={cx} y1={by-h*0.72} x2={cx-w*0.42} y2={by-h*0.86} stroke="#0e160f" strokeWidth={2*scale}/>
          <line x1={cx} y1={by-h*0.72} x2={cx+w*0.42} y2={by-h*0.86} stroke="#0e160f" strokeWidth={2*scale}/>
          {/* Insulator strings */}
          {[-0.55,-0.28,0,0.28,0.55].map((ox,ii)=>(
            <g key={ii}>
              <line x1={cx+ox*w*0.9} y1={by-h*0.75} x2={cx+ox*w*0.9} y2={by-h*0.75+14*scale}
                stroke="#131a14" strokeWidth={1.5*scale}/>
              <ellipse cx={cx+ox*w*0.9} cy={by-h*0.75+16*scale} rx={4*scale} ry={2.5*scale}
                fill="none" stroke="#131a14" strokeWidth={1.2*scale}/>
            </g>
          ))}
        </g>
      );
    })}

    {/* === POWER WIRES — 3 tiers, sagging catenary curves === */}
    {/* Bottom tier wires */}
    {[-0.55,-0.28,0,0.28,0.55].map((ox,wi)=>(
      <g key={wi}>
        {/* Dark base wire */}
        <path d={`M${60+ox*66},${680-380*0.75+18} Q${350},${680-380*0.75+38} Q${700},${680-380*0.75+22} Q${1050},${680-380*0.75+40} ${1400+ox*66},${680-380*0.75+18}`}
          fill="none" stroke="#0f1a10" strokeWidth="2.5"/>
        {/* Glowing electric wire */}
        <path d={`M${60+ox*66},${680-380*0.75+18} Q${350},${680-380*0.75+38} Q${700},${680-380*0.75+22} Q${1050},${680-380*0.75+40} ${1400+ox*66},${680-380*0.75+18}`}
          fill="none" stroke="#7eb89a" strokeWidth="1.2" opacity="0.35" filter="url(#wire_glow)"/>
      </g>
    ))}
    {/* Mid tier wires */}
    {[-0.42,-0.14,0.14,0.42].map((ox,wi)=>(
      <g key={wi}>
        <path d={`M${60+ox*50},${680-380*0.86+14} Q${400},${680-380*0.86+32} Q${700},${680-380*0.86+18} Q${1000},${680-380*0.86+34} ${1400+ox*50},${680-380*0.86+14}`}
          fill="none" stroke="#0f1a10" strokeWidth="2"/>
        <path d={`M${60+ox*50},${680-380*0.86+14} Q${400},${680-380*0.86+32} Q${700},${680-380*0.86+18} Q${1000},${680-380*0.86+34} ${1400+ox*50},${680-380*0.86+14}`}
          fill="none" stroke="#7eb89a" strokeWidth="1" opacity="0.28" filter="url(#wire_glow)"/>
      </g>
    ))}
    {/* Top tier wires */}
    {[-0.28,0,0.28].map((ox,wi)=>(
      <g key={wi}>
        <path d={`M${60+ox*34},${680-380*0.94+10} Q${450},${680-380*0.94+26} Q${700},${680-380*0.94+14} Q${950},${680-380*0.94+28} ${1400+ox*34},${680-380*0.94+10}`}
          fill="none" stroke="#0f1a10" strokeWidth="1.5"/>
        <path d={`M${60+ox*34},${680-380*0.94+10} Q${450},${680-380*0.94+26} Q${700},${680-380*0.94+14} Q${950},${680-380*0.94+28} ${1400+ox*34},${680-380*0.94+10}`}
          fill="none" stroke="#7eb89a" strokeWidth="0.8" opacity="0.22" filter="url(#wire_glow)"/>
      </g>
    ))}

    {/* === ANIMATED ELECTRICITY PULSES flowing along wires === */}
    {[0,1,2,3,4].map((wi)=>(
      <g key={wi}>
        <circle r="4" fill="#7eb89a" opacity="0.9" filter="url(#strong_glow)">
          <animateMotion
            path={`M${60-wi*11},${680-380*0.75+28} Q350,${680-380*0.75+46} 700,${680-380*0.75+30} Q1050,${680-380*0.75+48} 1400,${680-380*0.75+28}`}
            dur={`${2.8+wi*0.7}s`} begin={`${wi*0.5}s`} repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.9;0.9;0" dur={`${2.8+wi*0.7}s`} begin={`${wi*0.5}s`} repeatCount="indefinite"/>
        </circle>
        <circle r="2" fill="#ffffff" opacity="0.8">
          <animateMotion
            path={`M${60-wi*11},${680-380*0.75+28} Q350,${680-380*0.75+46} 700,${680-380*0.75+30} Q1050,${680-380*0.75+48} 1400,${680-380*0.75+28}`}
            dur={`${2.8+wi*0.7}s`} begin={`${wi*0.5}s`} repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.8;0.8;0" dur={`${2.8+wi*0.7}s`} begin={`${wi*0.5}s`} repeatCount="indefinite"/>
        </circle>
      </g>
    ))}
    {/* Second set of pulses on mid tier going opposite direction */}
    {[0,1,2].map((wi)=>(
      <circle key={wi} r="3" fill="#7eb89a" opacity="0.7" filter="url(#wire_glow)">
        <animateMotion
          path={`M1400,${680-380*0.86+22} Q1000,${680-380*0.86+42} 700,${680-380*0.86+26} Q400,${680-380*0.86+44} 60,${680-380*0.86+22}`}
          dur={`${3.2+wi*0.9}s`} begin={`${wi*0.8+1.2}s`} repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.7;0.7;0" dur={`${3.2+wi*0.9}s`} begin={`${wi*0.8+1.2}s`} repeatCount="indefinite"/>
      </circle>
    ))}

    {/* Subtle horizon atmospheric glow */}
    <ellipse cx="700" cy="680" rx="600" ry="60" fill="#7eb89a" opacity="0.03"/>
  </svg>
);

// Single source → multiple connections branching diagram
const ConnectionsSVG = () => (
  <svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" style={{width:'100%',height:'100%',position:'absolute',inset:0,display:'block'}}>
    <defs>
      <radialGradient id="cng" cx="20%" cy="50%" r="60%">
        <stop offset="0%" stopColor="#1a3a28" stopOpacity="1"/>
        <stop offset="100%" stopColor="#080808" stopOpacity="1"/>
      </radialGradient>
      <radialGradient id="nodeglow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stopColor="#7eb89a" stopOpacity="0.35"/>
        <stop offset="100%" stopColor="#7eb89a" stopOpacity="0"/>
      </radialGradient>
      <filter id="gf"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <rect width="800" height="500" fill="url(#cng)"/>

    {/* SOURCE node — left */}
    <circle cx="100" cy="250" r="28" fill="#0d1f15" stroke="#7eb89a" strokeWidth="2" opacity="0.9"/>
    <circle cx="100" cy="250" r="16" fill="#7eb89a" opacity="0.25"/>
    <circle cx="100" cy="250" r="7" fill="#7eb89a" opacity="0.9"/>
    <ellipse cx="100" cy="250" rx="48" ry="48" fill="url(#nodeglow)" opacity="0.8"/>
    <text x="100" y="295" textAnchor="middle" fill="#7eb89a" fontSize="10" fontFamily="monospace" letterSpacing="1" opacity="0.7">SOURCE</text>

    {/* Main trunk line */}
    <line x1="128" y1="250" x2="300" y2="250" stroke="#7eb89a" strokeWidth="3" opacity="0.6"/>

    {/* Branch point */}
    <circle cx="300" cy="250" r="8" fill="#7eb89a" opacity="0.5"/>

    {/* 5 branch lines fanning out */}
    {[
      {x2:520, y2:80,  label:'RESIDENTIAL'},
      {x2:520, y2:160, label:'COMMERCIAL'},
      {x2:520, y2:250, label:'INDUSTRIAL'},
      {x2:520, y2:340, label:'EV CHARGING'},
      {x2:520, y2:420, label:'SUBSTATION'},
    ].map(({x2,y2,label},i)=>(
      <g key={i}>
        {/* Branch line */}
        <line x1="300" y1="250" x2={x2-32} y2={y2} stroke="#7eb89a" strokeWidth="1.5" opacity="0.45" strokeDasharray="6 3"/>
        {/* End node */}
        <circle cx={x2} cy={y2} r="18" fill="#0d1f15" stroke="#7eb89a" strokeWidth="1.5" opacity="0.85"/>
        <circle cx={x2} cy={y2} r="7" fill="#7eb89a" opacity="0.5"/>
        <ellipse cx={x2} cy={y2} rx="30" ry="30" fill="url(#nodeglow)" opacity="0.5"/>
        <text x={x2+28} y={y2+4} fill="#7eb89a" fontSize="9" fontFamily="monospace" letterSpacing="1" opacity="0.65">{label}</text>
        {/* Sub-branches from end nodes */}
        {[y2-22, y2+22].map((sy,j)=>(
          <g key={j}>
            <line x1={x2+18} y1={y2} x2={720} y2={sy} stroke="#7eb89a" strokeWidth="1" opacity="0.2" strokeDasharray="4 4"/>
            <circle cx={720} cy={sy} r="5" fill="#7eb89a" opacity="0.2"/>
          </g>
        ))}
      </g>
    ))}

    {/* Pulse animation dots on trunk */}
    {[0.2,0.5,0.8].map((t,i)=>(
      <circle key={i} cx={128+t*172} cy="250" r="3" fill="#7eb89a" opacity="0.6">
        <animate attributeName="cx" from="128" to="300" dur="2s" begin={`${i*0.6}s`} repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.8;0" dur="2s" begin={`${i*0.6}s`} repeatCount="indefinite"/>
      </circle>
    ))}

    {/* Decorative grid dots */}
    {Array.from({length:20}).map((_,i)=>(
      <circle key={i} cx={(i*43)%800} cy={(i*61)%500} r="1" fill="#7eb89a" opacity="0.07"/>
    ))}
  </svg>
);
